syntax = "proto3";

package Metaspesa.Protos.Markets;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

import "infrastructure/grpc/protos/domain.proto";

// Handles the market related operations.
service MarketService {
  // Adds new products to the system.
  rpc AddProducts(AddProductsRequest) returns (google.protobuf.Empty);
}

// Request message for adding new products.
message AddProductsRequest {
  repeated Product products = 1;
  google.protobuf.Timestamp registered_at = 2;
}
