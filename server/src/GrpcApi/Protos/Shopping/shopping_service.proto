syntax = "proto3";

package Metaspesa.Protos.Shopping;

import "google/protobuf/empty.proto";

import "Protos/Shopping/domain.proto";

option csharp_namespace = "Metaspesa.GrpcApi.Protos.Shopping";

// Handles the shopping related operations.
service ShoppingService {
  // Gets the registered items.
  rpc GetRegisteredItems(google.protobuf.Empty) returns (RegisteredItemsResponse);

  // Gets the current shopping list.
  rpc GetCurrentShoppingList(google.protobuf.Empty) returns (CurrentShoppingList);

  // Creates a shopping list, returns the name.
  rpc CreateShoppingList(CreateShoppingListRequest) returns (CreateShoppingListResponse);

  // Adds new items to a shopping list.
  rpc AddItemsToList(AddItemsToListRequest) returns (google.protobuf.Empty);

  // Updates an item in a shopping list.
  rpc UpdateItem(UpdateItemRequest) returns (google.protobuf.Empty);

  // Remove item from a shopping list.
  rpc RemoveItem(RemoveItemRequest) returns (google.protobuf.Empty);

  // Records the items in the shopping list.
  rpc RecordShoppingList(RecordShoppingListRequest) returns (google.protobuf.Empty);
}

// Request message to create a shopping list
message CreateShoppingListRequest {
  /**
   * The name of the new list. Optional since it can be a temporal list (only
   * one at a time).
   */
  optional string name = 1;
}

// Response message with the name of the list.
message CreateShoppingListResponse {
  // Name of the list (unique per user).
  optional string name = 1;
}

// Request message to add items to a certain shopping list.
message AddItemsToListRequest {
  optional string shopping_list_name = 1;
  repeated ShoppingItem items = 2;
}

// Request message to update an item in a shopping list.
message UpdateItemRequest {
  string shopping_list_name = 1;
  string item_name = 2;
  optional string item_quantity = 3;
  optional float item_price = 4;
}

// Request message to remove an item from a shopping list.
message RemoveItemRequest {
  string shopping_list_name = 1;
  string item_name = 2;
}

// Response message with registered items.
message RegisteredItemsResponse {
  repeated ShoppingItem items = 1;
}

// Request message for getting the current shopping list.
message CurrentShoppingList {
  ShoppingList shopping_list = 1;
}

// Request message for recording the items in the shopping list.
message RecordShoppingListRequest {
  ShoppingList shopping_list = 1;
}