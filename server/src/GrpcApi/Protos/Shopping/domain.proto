syntax = "proto3";

package Metaspesa.Protos.Shopping;

option csharp_namespace = "Metaspesa.GrpcApi.Protos.Shopping";

// An item in the shopping list.
message ShoppingItem {
  string name = 1;
  optional string quantity = 2;
  optional float price = 3;
  bool checked = 4;
}

// A list of items for shopping.
message ShoppingList {
  repeated ShoppingItem items = 1;
  optional string name = 2;
}