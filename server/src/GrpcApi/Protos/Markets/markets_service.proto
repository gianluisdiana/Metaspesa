syntax = "proto3";

package Metaspesa.Protos.Markets;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

import "Protos/Markets/domain.proto";

option csharp_namespace = "Metaspesa.GrpcApi.Protos.Markets";

// Handles the market related operations.
service MarketService {
  // Adds new products to the system.
  rpc AddProducts(AddProductsRequest) returns (google.protobuf.Empty);
  // Returns market products with optional filters.
  rpc GetMarketProducts(GetMarketProductsRequest) returns (GetMarketProductsResponse);
  // Returns all markets with their basic info.
  rpc GetMarkets(google.protobuf.Empty) returns (GetMarketsResponse);
}

// Request message for adding new products.
message AddProductsRequest {
  repeated Product products = 1;
  google.protobuf.Timestamp registered_at = 2;
}

// Request message for getting market products with optional filters and pagination.
message GetMarketProductsRequest {
  optional string market_name = 1;
  optional string brand_name_segment = 2;
  optional string name_segment = 3;
  optional int32 page = 4;
  optional int32 page_size = 5;
}

// Response message containing matching markets with their products and total count.
message GetMarketProductsResponse {
  repeated Market markets = 1;
  int32 total_products = 2;
}

// Response message containing all markets.
message GetMarketsResponse {
  repeated MarketSummary markets = 1;
}
