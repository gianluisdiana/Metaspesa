name: Publish Docker images

on:
  release:
    types: [published]

jobs:
  docker:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: server
            image: gianluisdiana/metaspesa_server
            context: ./server
            dockerfile: ./server/src/GrpcApi/Dockerfile

          - name: migrations
            image: gianluisdiana/metaspesa_migrations
            context: ./server
            dockerfile: ./server/src/MigrationService/Dockerfile

          - name: client
            image: gianluisdiana/metaspesa_client
            context: ./client
            dockerfile: ./client/Dockerfile

          - name: scraper
            image: gianluisdiana/metaspesa_scraper
            context: ./scraper
            dockerfile: ./scraper/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract release version (without 'v' prefix)
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.version.outputs.VERSION }}
            ${{ matrix.image }}:latest
