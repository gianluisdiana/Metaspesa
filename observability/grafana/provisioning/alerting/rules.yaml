apiVersion: 1

groups:
  - orgId: 1
    name: metaspesa
    folder: Metaspesa
    interval: 1m
    rules:
      - uid: metaspesa-grpc-high-error-rate
        title: High HTTP/gRPC error rate
        condition: C
        data:
          - refId: A
            datasourceUid: mimir
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: mimir
              editorMode: code
              expr: sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])) / clamp_min(sum(rate(http_server_request_duration_seconds_count[5m])), 1)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.05
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: threshold
        noDataState: NoData
        execErrState: Error
        for: 2m
        annotations:
          summary: HTTP/gRPC error rate is above 5%.
          description: More than 5% of server requests have returned 5xx responses over the last 5 minutes.
        labels:
          service: metaspesa
          severity: warning
