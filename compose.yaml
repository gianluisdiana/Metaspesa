services:
  server:
    image: gianluisdiana/metaspesa_server:latest
    build:
      context: ./server
      dockerfile: ./src/GrpcApi/Dockerfile
    ports:
      - 5000:8080
    environment:
      ASPNETCORE_URLS: http://+:8080
      POSTGRES_CONNECTION_STRING: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    env_file:
      - .env

  migrations:
    image: gianluisdiana/metaspesa_migrations:latest
    build:
      context: ./server
      dockerfile: ./src/MigrationService/Dockerfile
    profiles:
      - tools
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_CONNECTION_STRING: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
    env_file:
      - .env

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    image: gianluisdiana/metaspesa_client:latest
    ports:
      - 3000:8080
    depends_on:
      - server
    environment:
      GRPC_SERVER_URL: server:8080
      PORT: 8080

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    image: gianluisdiana/metaspesa_scraper:latest
    depends_on:
      - db
    environment:
      POSTGRES_CONNECTION_STRING: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}

  db:
    image: postgres:latest
    ports:
      - 5432:5432
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql

volumes:
  db_data:
